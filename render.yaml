services:
  # 1. Flask Backend API (Docker)
  - type: web
    name: pepto-backend
    env: docker
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pepto-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pepto-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: pepto-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: pepto-redis
          property: connectionString

  # 2. Celery Background Worker (Docker)
  - type: worker
    name: pepto-celery-worker
    env: docker
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: "celery -A celery_app worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pepto-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pepto-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: pepto-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: pepto-redis
          property: connectionString

  # 3. React Frontend (Static Site)
  - type: web
    name: pepto-frontend
    env: static
    region: oregon
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: pepto-backend
          property: envVarConnectionPrefix
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # 4. Redis Cache & Message Broker (Paid Tier Required)
  - type: redis
    name: pepto-redis
    region: oregon
    plan: starter

databases:
  # 5. PostgreSQL Database
  - name: pepto-db
    databaseName: pepto_db
    user: pepto_user
    region: oregon
    plan: free
