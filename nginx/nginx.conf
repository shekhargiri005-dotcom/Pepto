# =============================================================================
# Pepto Pet Services Marketplace — Nginx Reverse Proxy Configuration
# =============================================================================
# Handles:
#   • HTTP → HTTPS redirect
#   • API proxy  → Flask backend   (localhost:5000)
#   • WebSocket  → Socket.IO       (localhost:5000)
#   • SPA        → React frontend  (localhost:3000)
#   • Gzip compression
#   • Security headers
#   • Rate limiting
#   • Static-asset caching
# =============================================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance tuning ────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75;
    keepalive_requests  1000;
    reset_timedout_connection on;
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout        10;
    types_hash_max_size 2048;
    server_tokens       off;      # Hide nginx version

    # ── Upload size (pet photo uploads) ──────────────────────────────────────
    client_max_body_size 20m;
    client_body_buffer_size 128k;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip               on;
    gzip_comp_level    6;
    gzip_min_length    1024;
    gzip_proxied       any;
    gzip_vary          on;
    gzip_buffers       32 4k;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/x-component
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xhtml+xml
        application/rss+xml
        application/atom+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-font-opentype
        application/x-font-truetype
        image/svg+xml
        image/x-icon
        font/opentype
        font/eot
        font/otf
        font/ttf;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # General API rate limit — 60 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    # Stricter limit for auth endpoints — 10 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    # Upload endpoint — 5 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;

    limit_req_status  429;
    limit_conn_status 429;

    # ── Upstream definitions ──────────────────────────────────────────────────
    upstream backend {
        server backend:5000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:80;
        keepalive 16;
    }

    # ── Map: upgrade WebSocket connections ────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Server block 1: HTTP → HTTPS redirect (port 80)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Let's Encrypt ACME challenge (certbot webroot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Server block 2: HTTPS (port 443)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name pepto.app www.pepto.app;

        # ── SSL / TLS configuration ─────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_dhparam         /etc/nginx/ssl/dhparam.pem;   # openssl dhparam -out dhparam.pem 4096

        # Only allow TLS 1.2 and 1.3
        ssl_protocols TLSv1.2 TLSv1.3;

        # Modern cipher suite (OWASP recommended)
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:'
                    'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:'
                    'ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:'
                    'DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;

        ssl_session_cache   shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ── Security headers ────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
        add_header Content-Security-Policy
            "default-src 'self'; "
            "script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://api.mapbox.com; "
            "style-src 'self' 'unsafe-inline' https://api.mapbox.com https://fonts.googleapis.com; "
            "img-src 'self' data: blob: https://res.cloudinary.com https://api.mapbox.com https://*.mapbox.com; "
            "connect-src 'self' wss: https://api.stripe.com https://api.mapbox.com https://events.mapbox.com; "
            "font-src 'self' https://fonts.gstatic.com; "
            "frame-src https://js.stripe.com; "
            "object-src 'none';" always;

        # ── /api/ — Flask REST backend ──────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
            proxy_set_header   Connection        "";

            proxy_buffering    on;
            proxy_buffer_size  8k;
            proxy_buffers      8 8k;

            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            proxy_hide_header X-Powered-By;
        }

        # ── /api/auth/ — stricter rate limit ────────────────────────────────
        location ~* ^/api/auth/(login|register|forgot-password) {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── /api/upload — upload rate limit ─────────────────────────────────
        location /api/upload {
            limit_req zone=upload_limit burst=3 nodelay;
            client_max_body_size 20m;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_read_timeout 120s;
        }

        # ── /socket.io/ — WebSocket proxy ───────────────────────────────────
        location /socket.io/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout  86400s;  # Keep WebSocket connections alive
            proxy_send_timeout  86400s;
            proxy_buffering     off;
        }

        # ── Static assets served by nginx directly (long-lived cache) ────────
        location /static/ {
            alias /var/www/static/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            access_log off;
        }

        # ── Favicon & robots.txt — short-circuit at nginx ────────────────────
        location = /favicon.ico {
            log_not_found off;
            access_log    off;
            expires       7d;
        }

        location = /robots.txt {
            log_not_found off;
            access_log    off;
        }

        # ── / — React SPA (everything else) ─────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # Cache JS/CSS chunks aggressively (Vite content-hashes them)
            location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
                proxy_pass http://frontend;
                expires 30d;
                add_header Cache-Control "public, max-age=2592000, immutable";
                access_log off;
            }
        }

        # ── Error pages ──────────────────────────────────────────────────────
        error_page 404              /404.html;
        error_page 429              /429.html;
        error_page 500 502 503 504  /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
