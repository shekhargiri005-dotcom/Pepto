# =============================================================================
# Pepto Pet Services Marketplace — Docker Compose (Production / Development)
# =============================================================================
# Usage:
#   Development : docker-compose up --build
#   Production  : docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================

version: "3.9"

# ---------------------------------------------------------------------------
# Shared extension fields (YAML anchors)
# ---------------------------------------------------------------------------
x-backend-base: &backend-base
  build:
    context: ./backend
    dockerfile: Dockerfile
    target: production
  image: pepto-backend:latest
  env_file:
    - ./backend/.env
  networks:
    - pepto_network
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # ── PostgreSQL + PostGIS ──────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: pepto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pepto_user
      POSTGRES_PASSWORD: pepto_pass
      POSTGRES_DB: pepto_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pepto_user -d pepto_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pepto_network
    logging: *default-logging

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pepto_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pepto_network
    logging: *default-logging

  # ── Flask Backend ─────────────────────────────────────────────────────────
  backend:
    <<: *backend-base
    container_name: pepto_backend
    volumes:
      # Development bind-mount: remove in pure production
      - ./backend:/app
      # Named volume for collected static files shared with nginx
      - staticfiles:/app/staticfiles
    ports:
      - "5000:5000"
    command: >
      gunicorn -c gunicorn.conf.py wsgi:app
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://pepto_user:pepto_pass@postgres:5432/pepto_db
      REDIS_URL: redis://redis:6379/0
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging

  # ── Celery Worker ─────────────────────────────────────────────────────────
  celery_worker:
    <<: *backend-base
    container_name: pepto_celery_worker
    command: >
      celery -A celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=default,emails,notifications,payments
      -n worker@%h
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://pepto_user:pepto_pass@postgres:5432/pepto_db
      REDIS_URL: redis://redis:6379/0
      C_FORCE_ROOT: "false"
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app inspect ping -d worker@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    logging: *default-logging

  # ── Celery Beat (Scheduler) ───────────────────────────────────────────────
  celery_beat:
    <<: *backend-base
    container_name: pepto_celery_beat
    command: >
      celery -A celery_app beat
      --loglevel=info
      --scheduler celery.beat:PersistentScheduler
      --pidfile=/tmp/celerybeat.pid
      --schedule=/tmp/celerybeat-schedule
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://pepto_user:pepto_pass@postgres:5432/pepto_db
      REDIS_URL: redis://redis:6379/0
    logging: *default-logging

  # ── React Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:5000}
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}
        VITE_CLOUDINARY_CLOUD_NAME: ${VITE_CLOUDINARY_CLOUD_NAME:-}
    image: pepto-frontend:latest
    container_name: pepto_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - pepto_network
    logging: *default-logging

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: pepto_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ssl_certs:/etc/nginx/ssl:ro
      - staticfiles:/var/www/static:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - pepto_network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  pepto_network:
    driver: bridge
    name: pepto_network
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ---------------------------------------------------------------------------
# Named Volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    name: pepto_postgres_data
    driver: local
  redis_data:
    name: pepto_redis_data
    driver: local
  staticfiles:
    name: pepto_staticfiles
    driver: local
  ssl_certs:
    name: pepto_ssl_certs
    driver: local
